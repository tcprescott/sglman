name: Build and Deploy Docker Image

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/sglman:latest .

      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ github.repository }}/sglman:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to host (example)
        run: |
          echo "Deploy step here. Use SSH, Ansible, or your preferred method."
          # Example SSH deployment:
          # ssh user@host 'docker pull ghcr.io/${{ github.repository }}/sglman:latest && docker stop sglman || true && docker rm sglman || true && docker run -d --name sglman -p 80:8080 --env-file /path/to/.env ghcr.io/${{ github.repository }}/sglman:latest'
