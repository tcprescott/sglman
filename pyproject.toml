[tool.poetry]
name = "sgliveadmin"
version = "0.1.0"
description = ""
authors = ["Thomas Prescott <tcprescott@gmail.com>"]
readme = "README.md"
package-mode = false

[tool.poetry.dependencies]
python = "^3.10"
nicegui = "^2.11.1"
fastapi = "^0.115.8"
pyyaml = "^6.0.2"
pymysql = "^1.1.1"
tortoise-orm = {extras = ["asyncmy"], version = "^0.24.0"}
aerich = {extras = ["toml"], version = "^0.8.1"}



[tool.poetry.group.dev.dependencies]
ipython = "^8.32.0"

[tool.aerich]
tortoise_orm = "migrations.tortoise_config.TORTOISE_ORM"
location = "./migrations"
src_folder = "./."
[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
