# Fly.io deployment for SGLMan (FastAPI + NiceGUI + Discord bot).
# Single always-on instance only — the Discord bot, in-process DM queue, and NiceGUI
# UI state are in-process singletons. Do NOT scale count > 1 or enable scale-to-zero.
# See docs/deployment.md "Single worker — required".

app = "sglonsite"            # confirm/replace at `fly launch`
primary_region = "iad"    # pick the region closest to your users

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false   # bot must stay connected to the Discord gateway
  auto_start_machines = false
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    soft_limit = 200
    hard_limit = 250

  [[http_service.checks]]
    method = "get"
    path = "/api/docs"         # FastAPI up; no DB or login required
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"

# Persist NiceGUI session storage (app.storage.user holds the logged-in discord_id) across
# deploys; otherwise the rootfs is rebuilt from the image on every deploy and all users are
# logged out. Single instance, so no multi-attach concern. Create with:
#   fly volumes create nicegui_data --size 1
[[mounts]]
  source = "nicegui_data"
  destination = "/app/.nicegui"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"             # bump to 1gb if the bot/image needs more headroom
